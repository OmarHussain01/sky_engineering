{% extends 'base.html' %}
{% block title %}Profile{% endblock %}
{% block content %}
<h1>Profile</h1>
<p class="text-muted">Username: {{ request.user.username }}</p>
<form method="post" class="col-md-6">
  {% csrf_token %}
  {% for field in form %}
    <div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}{{ field.errors }}</div>
  {% endfor %}
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{% url 'change_password' %}" class="btn btn-link">Change password</a>
</form>
{% endblock %}
